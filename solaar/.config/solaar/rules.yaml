%YAML 1.3
---
- Rule:
  - MouseGesture: Mouse Up
  - KeyPress:
    - [Control_L, Shift_L, t]
    - click
- Rule:
  - MouseGesture: Mouse Down
  - KeyPress:
    - [Control_L, w]
    - click
- Rule:
  - MouseGesture: Mouse Left
  - KeyPress:
    - [Super_L, Page_Down]
    - click
- Rule:
  - MouseGesture: Mouse Right
  - KeyPress:
    - [Super_L, Page_Up]
    - click
- Rule:
  - MouseGesture: []
  - KeyPress:
    - Super_L
    - click
...
